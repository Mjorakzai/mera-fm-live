<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mera FM | Testing Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #111; color: white; font-family: sans-serif; padding: 20px; }
        .station-btn { 
            width: 100%; background: #222; border: 1px solid #444; 
            padding: 15px; margin-bottom: 10px; border-radius: 10px; text-align: left;
        }
        .station-btn:active { background: #333; }
        #status { color: #3b82f6; font-weight: bold; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>

    <h1 class="text-2xl font-bold text-center mb-4">Radio Test (Direct)</h1>
    <div id="status">Status: Waiting...</div>

    <div id="station-list"></div>

    <audio id="audioPlayer" controls class="w-full mt-10"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Firebase Config
        const firebaseConfig = {
            databaseURL: "https://mera-fm-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const audio = document.getElementById('audioPlayer');
        const status = document.getElementById('status');

        let stations = [];

        // Fetch Stations from Firebase
        onValue(ref(db, 'stations'), (snap) => {
            const list = document.getElementById('station-list');
            list.innerHTML = '';
            stations = [];

            snap.forEach((child) => {
                stations.push(child.val());
            });

            stations.forEach((s, index) => {
                const btn = document.createElement('button');
                btn.className = 'station-btn';
                btn.innerHTML = `<strong>${s.name}</strong><br><small>${s.url}</small>`;
                btn.onclick = () => playStation(index);
                list.appendChild(btn);
            });
            status.innerText = "Status: Stations Loaded";
        });

        // Simple Play Logic
        window.playStation = (idx) => {
            const s = stations[idx];
            status.innerText = "Status: Connecting to " + s.name;
            
            // Sab kuch clear karke naya source set karein
            audio.pause();
            audio.src = s.url;
            audio.load();
            
            audio.play()
                .then(() => {
                    status.innerText = "Status: Playing ✅";
                })
                .catch(e => {
                    status.innerText = "Status: Error ❌ (Click Play Manually)";
                    console.log("Error:", e);
                });
        };

        // Error Handling
        audio.onerror = () => {
            status.innerText = "Status: Audio Error ❌ (Invalid Stream)";
        };
    </script>
</body>
</html>
